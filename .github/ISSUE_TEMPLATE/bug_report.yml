name: Bug Report
description: Report an issue to help improve ER Designer
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug 🙏  
        Please fill out the details below so we can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: Problem summary
      description: One sentence — what breaks, under what condition.
      placeholder: e.g. Importing a MySQL schema with composite foreign keys crashes the app on macOS 14
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect your work?
      options:
        - Critical — app is unusable
        - High — core feature broken, no workaround
        - Medium — workaround exists
        - Low — minor / cosmetic
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      description: Did this work in a previous version?
      options:
        - Yes — worked before
        - No — never worked
        - Not sure

  - type: markdown
    attributes:
      value: "---"

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. 14.4.1
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: ER Designer version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: dropdown
    id: db-type
    attributes:
      label: Database type
      options:
        - MySQL
        - PostgreSQL
        - SQLite
        - Other
    validations:
      required: true

  - type: input
    id: db-version
    attributes:
      label: Database version (optional)
      placeholder: e.g. MySQL 8.0.36

  - type: dropdown
    id: connection-type
    attributes:
      label: Connection type (optional)
      options:
        - Local database
        - Remote database
        - Docker container
        - Other

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: |
        Describe how to reproduce the issue and what happened.
  
        Please include:
        1. Steps to reproduce
        2. What you expected to happen
        3. What actually happened
  
        Be clear and concise — assume we are starting from a fresh app install.
      placeholder: |
        Steps:
        1. Open ER Designer
        2. Import schema.sql
  
        Expected:
        Schema loads successfully
  
        Actual:
        App crashes with NullPointerException
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility (optional)
      options:
        - Always
        - Often (>50% of the time)
        - Sometimes
        - Rarely / happened once

  - type: checkboxes
    id: context
    attributes:
      label: Context (optional)
      options:
        - label: Working with an existing database
        - label: Creating a new / empty schema
        - label: Import
        - label: Export
        - label: Diagram editing
        - label: Diff / migration
        - label: Reproducible in a new/empty project

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: extra
    attributes:
      label: Additional information (logs, screenshots, files)
      description: |
        Include anything that may help us debug the issue:
        - Error logs or stack traces
        - Screenshots or screen recordings
        - Sample SQL / schema files

        You can drag and drop files directly into this box.

        Logs may be located at:
        ~/Library/Logs/ERDesigner/
      placeholder: |
        Paste logs here, or attach screenshots / recordings…

        Example:
        ERROR NullPointerException at SchemaParser.java:42
